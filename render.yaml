# Render Blueprint for the SmartFolio FastAPI backend.
# In Render: New + -> Blueprint -> pick this repo. It reads this file.
# Secrets (sync: false) are entered in the Render dashboard, not committed.
services:
  - type: web
    name: smartfolio-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: MARKET_DATA_PROVIDER
        value: finnhub # QUOTE provider: fast live prices (free tier 60 req/min)
      - key: MARKET_DATA_API_KEY
        sync: false # the quote provider's key (Finnhub) — secret
      - key: ALPHAVANTAGE_API_KEY
        sync: false # DEEP-data key (secret). Hybrid: Finnhub serves quotes while
                    # Alpha Vantage serves the daily history + fundamentals it
                    # can't. AV free tier is ~25 req/day, so spending it only on
                    # history/fundamentals (not quotes) is what makes it viable.
                    # Omit to run quote-only (forecast uses reference volatility).
      - key: DEEP_ANALYSIS
        value: "1" # 1 = pull daily history + fundamentals; 0 = quote-only
      - key: NEWS_SENTIMENT
        value: "1" # 1 = include news-tone drift signal; 0 = skip (saves 1 req/ticker)
      - key: DATABASE_URL
        sync: false # Postgres (e.g. Neon) — REQUIRED for the market-data cache to
                    # survive restarts; falls back to ephemeral sqlite if unset
      - key: PLAID_CLIENT_ID
        sync: false # free sandbox key: https://dashboard.plaid.com
      - key: PLAID_SECRET
        sync: false # free sandbox key (secret)
      - key: PLAID_ENV
        value: sandbox # sandbox | development | production
      - key: SMARTFOLIO_CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://smartfolio.vercel.app
