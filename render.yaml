# Render Blueprint for the SmartFolio FastAPI backend.
# In Render: New + -> Blueprint -> pick this repo. It reads this file.
# Secrets (sync: false) are entered in the Render dashboard, not committed.
services:
  - type: web
    name: smartfolio-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: MARKET_DATA_PROVIDER
        value: alphavantage
      - key: MARKET_DATA_API_KEY
        sync: false # set your free key in the dashboard (secret)
      - key: SMARTFOLIO_CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://smartfolio.vercel.app
