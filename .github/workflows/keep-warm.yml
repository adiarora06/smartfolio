name: Keep backend warm

# Render's free tier sleeps after 15 minutes of inactivity, which makes the
# first request take ~30-60s. This ping keeps the demo snappy. Delete this
# workflow after upgrading to a paid instance.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --max-time 90 https://smartfolio-api-yjcj.onrender.com/health
